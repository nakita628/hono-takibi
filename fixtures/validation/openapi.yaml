openapi: '3.1.0'
info:
  title: Validation Message Test API
  version: '1.0.0'
  description: OpenAPI spec with x-* vendor extensions for custom validation messages
paths:
  /users:
    post:
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUser'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /validate:
    post:
      operationId: validateData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateInput'
      responses:
        '200':
          description: OK
  /metadata:
    post:
      operationId: createMetadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Metadata'
      responses:
        '200':
          description: OK
components:
  schemas:
    CreateUser:
      type: object
      required:
        - name
        - email
        - age
        - tags
        - priority
      dependentRequired:
        password:
          - code
      x-dependentRequired-message: 'Code is required when password is provided'
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 20
          x-minimum-message: 'Name must be at least 3 characters'
          x-maximum-message: 'Name must be at most 20 characters'
        email:
          type: string
          format: email
          x-error-message: 'Invalid email address'
        age:
          type: integer
          minimum: 0
          maximum: 150
          x-minimum-message: 'Age must be >= 0'
          x-maximum-message: 'Age must be <= 150'
        password:
          type: string
          pattern: '^(?=.*[A-Z])(?=.*[0-9]).{8,}$'
          x-pattern-message: 'Password must contain uppercase and number, min 8 chars'
        code:
          type: string
          minLength: 5
          maxLength: 5
          x-size-message: 'Code must be exactly 5 characters'
        tags:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 5
          x-error-message: 'Must have 1-5 tags'
          x-minimum-message: 'Must have 1-5 tags'
          x-maximum-message: 'Must have 1-5 tags'
        # Arrow function error message (no args) — Zod v4
        nickname:
          type: string
          x-error-message: '()=>"Nickname is invalid"'
        # Arrow function error message (iss arg) — Zod v4
        priority:
          type: integer
          minimum: 1
          maximum: 10
          x-error-message: '(iss) => iss.input === undefined ? "Priority is required" : "Priority must be an integer"'
          x-minimum-message: 'Priority must be >= 1'
          x-maximum-message: 'Priority must be <= 10'
        # x-multipleOf-message
        score:
          type: integer
          multipleOf: 5
          x-multipleOf-message: 'Score must be a multiple of 5'
        # x-enum-error-messages (per-value enum messages)
        role:
          type: string
          enum: [admin, user, guest]
          x-error-message: 'Must be a valid role'
          x-enum-error-messages:
            admin: 'Select admin role'
            user: 'Select user role'
            guest: 'Select guest role'
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        age:
          type: integer
    # x-anyOf-message, x-oneOf-message, x-not-message
    ValidateInput:
      type: object
      required:
        - value
      properties:
        value:
          anyOf:
            - type: string
            - type: integer
          x-anyOf-message: 'Must be a string or integer'
        category:
          oneOf:
            - type: string
            - type: integer
          x-oneOf-message: 'Must be exactly one type'
        forbidden:
          not:
            type: string
          x-not-message: 'Must not be a string'
    # x-propertyNames-message
    Metadata:
      type: object
      additionalProperties:
        type: string
      propertyNames:
        pattern: '^[a-z_]+$'
      x-propertyNames-message: 'Keys must be lowercase with underscores only'
