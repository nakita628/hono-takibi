openapi: '3.1.0'
info:
  title: Brand Test API
  version: '1.0.0'
  description: OpenAPI spec with x-brand vendor extension for branded types
paths:
  /users:
    post:
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUser'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /users/{userId}:
    get:
      operationId: getUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UserId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /posts:
    post:
      operationId: createPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePost'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
components:
  schemas:
    UserId:
      type: string
      format: uuid
      x-brand: UserId
    PostId:
      type: string
      format: uuid
      x-brand: PostId
    Email:
      type: string
      format: email
      x-brand: Email
    Price:
      type: number
      minimum: 0
      x-brand: Price
    Quantity:
      type: integer
      minimum: 0
      x-brand: Quantity
    Username:
      type: string
      minLength: 3
      maxLength: 20
      x-brand: Username
    Tags:
      type: array
      items:
        type: string
      minItems: 1
      maxItems: 10
      x-brand: Tags
    CreateUser:
      type: object
      required:
        - email
        - username
        - price
      properties:
        email:
          $ref: '#/components/schemas/Email'
        username:
          $ref: '#/components/schemas/Username'
        price:
          $ref: '#/components/schemas/Price'
        tags:
          $ref: '#/components/schemas/Tags'
    User:
      type: object
      required:
        - id
        - email
        - username
      properties:
        id:
          $ref: '#/components/schemas/UserId'
        email:
          $ref: '#/components/schemas/Email'
        username:
          $ref: '#/components/schemas/Username'
    CreatePost:
      type: object
      required:
        - authorId
        - title
        - quantity
      properties:
        authorId:
          $ref: '#/components/schemas/UserId'
        title:
          type: string
        quantity:
          $ref: '#/components/schemas/Quantity'
    Post:
      type: object
      required:
        - id
        - authorId
        - title
      properties:
        id:
          $ref: '#/components/schemas/PostId'
        authorId:
          $ref: '#/components/schemas/UserId'
        title:
          type: string
