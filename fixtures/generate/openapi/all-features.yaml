components:
  schemas:
    AllExportsUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
      required:
        - id
        - name
        - email
    AllExportsUserList:
      type: array
      items:
        $ref: "#/components/schemas/AllExportsUser"
    CircularRefsTreeNode:
      type: object
      properties:
        id:
          type: integer
        value:
          type: string
        children:
          type: array
          items:
            $ref: "#/components/schemas/CircularRefsTreeNode"
      required:
        - id
        - value
    CircularRefsNodeA:
      type: object
      properties:
        id:
          type: integer
        ref:
          $ref: "#/components/schemas/CircularRefsNodeB"
      required:
        - id
    CircularRefsNodeB:
      type: object
      properties:
        id:
          type: integer
        ref:
          $ref: "#/components/schemas/CircularRefsNodeC"
      required:
        - id
    CircularRefsNodeC:
      type: object
      properties:
        id:
          type: integer
        ref:
          $ref: "#/components/schemas/CircularRefsNodeA"
      required:
        - id
    ParametersMergeItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt
    ParametersMergeItemUpdate:
      type: object
      properties:
        name:
          type: string
    SchemaEdgeCasesNullableFields:
      type: object
      properties:
        name:
          type: string
        nickname:
          type:
            - string
            - "null"
        age:
          type:
            - integer
            - "null"
        tags:
          type:
            - array
            - "null"
          items:
            type: string
      required:
        - name
    SchemaEdgeCasesCircle:
      type: object
      properties:
        kind:
          type: string
          const: circle
        radius:
          type: number
      required:
        - kind
        - radius
    SchemaEdgeCasesRectangle:
      type: object
      properties:
        kind:
          type: string
          const: rectangle
        width:
          type: number
        height:
