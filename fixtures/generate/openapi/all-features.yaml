openapi: 3.1.0
info:
  title: All Features — consolidated generate fixture
  version: 1.0.0
  description: Every per-feature OpenAPI spec merged into one document via scripts/merge-specs.mjs. Each former spec is namespaced by a path/name prefix.
paths:
  /minimal/health:
    get:
      operationId: minimalGetHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                  - status
  /allExports/users:
    get:
      operationId: allExportsGetUsers
      parameters:
        - $ref: "#/components/parameters/AllExportsPageParam"
      responses:
        "200":
          $ref: "#/components/responses/AllExportsUserListResponse"
    post:
      operationId: allExportsCreateUser
      requestBody:
        $ref: "#/components/requestBodies/AllExportsCreateUserBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllExportsUser"
          links:
            GetUser:
              $ref: "#/components/links/AllExportsGetUserLink"
  /allExports/users/{id}:
    get:
      operationId: allExportsGetUserById
      parameters:
        - $ref: "#/components/parameters/AllExportsUserIdParam"
      security:
        - AllExportsBearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllExportsUser"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/AllExportsXRequestId"
  /circularRefs/tree:
    get:
      operationId: circularRefsGetTree
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CircularRefsTreeNode"
    post:
      operationId: circularRefsCreateTree
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CircularRefsTreeNode"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CircularRefsTreeNode"
  /circularRefs/graph:
    get:
      operationId: circularRefsGetGraph
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CircularRefsNodeA"
  /securitySchemes/public:
    get:
      operationId: securitySchemesGetPublic
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
  /securitySchemes/bearer-protected:
    get:
      operationId: securitySchemesGetBearerProtected
      security:
        - SecuritySchemesBearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                required:
                  - data
  /securitySchemes/api-key-protected:
    get:
      operationId: securitySchemesGetApiKeyProtected
      security:
        - SecuritySchemesApiKeyAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                required:
                  - data
  /securitySchemes/basic-protected:
    get:
      operationId: securitySchemesGetBasicProtected
      security:
        - SecuritySchemesBasicAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                required:
                  - data
  /securitySchemes/oauth-protected:
    get:
      operationId: securitySchemesGetOAuthProtected
      security:
        - SecuritySchemesOAuth2:
            - read
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                required:
                  - data
  /securitySchemes/multi-auth:
    get:
      operationId: securitySchemesGetMultiAuth
      security:
        - SecuritySchemesBearerAuth: []
          SecuritySchemesApiKeyAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                required:
                  - data
  /contentTypes/json:
    post:
      operationId: contentTypesPostJson
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                value:
                  type: integer
              required:
                - name
                - value
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                required:
                  - id
                  - name
  /contentTypes/form:
    post:
      operationId: contentTypesPostForm
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
  /contentTypes/upload:
    post:
      operationId: contentTypesUploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
              required:
                - file
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                required:
                  - url
  /contentTypes/text:
    post:
      operationId: contentTypesPostText
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
  /contentTypes/multi-content:
    post:
      operationId: contentTypesPostMultiContent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: string
              required:
                - data
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                data:
                  type: string
              required:
                - data
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                required:
                  - received
  /parametersMerge/items/{itemId}:
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
      - name: version
        in: header
        schema:
          type: string
          default: "1"
    get:
      operationId: parametersMergeGetItem
      parameters:
        - name: fields
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParametersMergeItem"
    put:
      operationId: parametersMergeUpdateItem
      parameters:
        - name: version
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParametersMergeItemUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParametersMergeItem"
    delete:
      operationId: parametersMergeDeleteItem
      responses:
        "204":
          description: Deleted
  /parametersMerge/items:
    get:
      operationId: parametersMergeListItems
      parameters:
        - $ref: "#/components/parameters/ParametersMergeLimitParam"
        - $ref: "#/components/parameters/ParametersMergeOffsetParam"
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - name
              - created
              - updated
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ParametersMergeItem"
                  total:
                    type: integer
                required:
                  - items
                  - total
  /schemaEdgeCases/nullable:
    post:
      operationId: schemaEdgeCasesPostNullable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchemaEdgeCasesNullableFields"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaEdgeCasesNullableFields"
  /schemaEdgeCases/discriminated:
    post:
      operationId: schemaEdgeCasesPostDiscriminated
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchemaEdgeCasesShape"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaEdgeCasesShape"
  /schemaEdgeCases/composed:
    get:
      operationId: schemaEdgeCasesGetComposed
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaEdgeCasesComposedObject"
  /schemaEdgeCases/deep-nested:
    get:
      operationId: schemaEdgeCasesGetDeepNested
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaEdgeCasesLevel1"
  /schemaEdgeCases/additional-props:
    get:
      operationId: schemaEdgeCasesGetAdditionalProps
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaEdgeCasesDynamicMap"
  /callbacksLinks/subscriptions:
    post:
      operationId: callbacksLinksCreateSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallbacksLinksSubscriptionRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbacksLinksSubscription"
          links:
            GetSubscription:
              $ref: "#/components/links/CallbacksLinksGetSubscriptionLink"
      callbacks:
        onEvent:
          $ref: "#/components/callbacks/CallbacksLinksSubscriptionEvent"
  /callbacksLinks/subscriptions/{id}:
    get:
      operationId: callbacksLinksGetSubscription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbacksLinksSubscription"
          links:
            DeleteSubscription:
              $ref: "#/components/links/CallbacksLinksDeleteSubscriptionLink"
    delete:
      operationId: callbacksLinksDeleteSubscription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /callbacksLinks/webhooks/test:
    post:
      operationId: callbacksLinksTestWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
              required:
                - url
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent:
                    type: boolean
                required:
                  - sent
  /crudRefs/posts:
    get:
      operationId: crudRefsListPosts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/CrudRefsPost"
                  total:
                    type: integer
                required:
                  - posts
                  - total
    post:
      operationId: crudRefsCreatePost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrudRefsCreatePost"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrudRefsPost"
  /crudRefs/posts/{id}:
    get:
      operationId: crudRefsGetPost
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrudRefsPost"
    put:
      operationId: crudRefsUpdatePost
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrudRefsUpdatePost"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrudRefsPost"
    delete:
      operationId: crudRefsDeletePost
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /crudRefs/posts/{id}/comments:
    get:
      operationId: crudRefsListComments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrudRefsComment"
    post:
      operationId: crudRefsCreateComment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrudRefsCreateComment"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrudRefsComment"
  /crudRefs/tags:
    get:
      operationId: crudRefsListTags
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrudRefsTag"
  /comprehensive/users:
    get:
      operationId: comprehensiveListUsers
      parameters:
        - $ref: "#/components/parameters/ComprehensivePageParam"
        - $ref: "#/components/parameters/ComprehensiveLimitParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/ComprehensiveUser"
                  total:
                    type: integer
                required:
                  - users
                  - total
    post:
      operationId: comprehensiveCreateUser
      security:
        - ComprehensiveBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComprehensiveCreateUser"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComprehensiveUser"
  /comprehensive/users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: comprehensiveGetUser
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComprehensiveUser"
        "404":
          $ref: "#/components/responses/ComprehensiveNotFound"
    put:
      operationId: comprehensiveUpdateUser
      security:
        - ComprehensiveBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComprehensiveUpdateUser"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComprehensiveUser"
    delete:
      operationId: comprehensiveDeleteUser
      security:
        - ComprehensiveBearerAuth: []
      responses:
        "204":
          description: Deleted
  /comprehensive/products:
    get:
      operationId: comprehensiveListProducts
      parameters:
        - $ref: "#/components/parameters/ComprehensivePageParam"
        - $ref: "#/components/parameters/ComprehensiveLimitParam"
        - name: category
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: "#/components/schemas/ComprehensiveProduct"
                  total:
                    type: integer
                required:
                  - products
                  - total
    post:
      operationId: comprehensiveCreateProduct
      security:
        - ComprehensiveBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComprehensiveCreateProduct"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComprehensiveProduct"
  /comprehensive/products/{productId}:
    parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: comprehensiveGetProduct
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComprehensiveProduct"
        "404":
          $ref: "#/components/responses/ComprehensiveNotFound"
    put:
      operationId: comprehensiveUpdateProduct
      security:
        - ComprehensiveBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComprehensiveUpdateProduct"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComprehensiveProduct"
  /comprehensive/products/{productId}/reviews:
    parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: comprehensiveListReviews
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComprehensiveReview"
    post:
      operationId: comprehensiveCreateReview
      security:
        - ComprehensiveBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComprehensiveCreateReview"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComprehensiveReview"
  /comprehensive/orders:
    get:
      operationId: comprehensiveListOrders
      security:
        - ComprehensiveBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ComprehensivePageParam"
        - $ref: "#/components/parameters/ComprehensiveLimitParam"
        - name: status
          in: query
          schema:
            type: string
            enum:
              - pending
              - confirmed
              - shipped
              - delivered
              - cancelled
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: "#/components/schemas/ComprehensiveOrder"
                  total:
                    type: integer
                required:
                  - orders
                  - total
    post:
      operationId: comprehensiveCreateOrder
      security:
        - ComprehensiveBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComprehensiveCreateOrder"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComprehensiveOrder"
  /comprehensive/orders/{orderId}:
    parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: comprehensiveGetOrder
      security:
        - ComprehensiveBearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComprehensiveOrder"
        "404":
          $ref: "#/components/responses/ComprehensiveNotFound"
  /comprehensive/categories:
    get:
      operationId: comprehensiveListCategories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComprehensiveCategory"
  /comprehensive/upload/image:
    post:
      operationId: comprehensiveUploadImage
      security:
        - ComprehensiveBearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                alt:
                  type: string
              required:
                - image
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                  width:
                    type: integer
                  height:
