      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompositionKeywordsSearchFilter"
  /compositionKeywords/all-of:
    post:
      operationId: compositionKeywordsPostAllOf
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompositionKeywordsEmployee"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompositionKeywordsEmployee"
  /compositionKeywords/not:
    post:
      operationId: compositionKeywordsPostNot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompositionKeywordsNotStringValue"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompositionKeywordsNotStringValue"
  /compositionKeywords/not-ref:
    get:
      operationId: compositionKeywordsGetNotRef
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompositionKeywordsNotAdmin"
  /compositionKeywords/not-enum:
    get:
      operationId: compositionKeywordsGetNotEnum
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompositionKeywordsNotDraftOrArchived"
  /compositionKeywords/not-const:
    get:
      operationId: compositionKeywordsGetNotConst
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompositionKeywordsNotSpecificValue"
  /compositionKeywords/not-composition:
    get:
      operationId: compositionKeywordsGetNotComposition
      responses:
        "200":
