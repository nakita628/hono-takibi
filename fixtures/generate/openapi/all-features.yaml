  /trailingSlashReal/api/reverseGeocode/:
    get:
      summary: Reverse geocode lookup
      operationId: trailingSlashRealGetApiReverseGeocodeIndex
      parameters:
        - name: callback
          in: query
          description: Callback function name for JSONP
          required: false
          schema:
            type: string
        - name: search_type
          in: query
          description: Search type
          required: false
          schema:
            type: string
            enum:
              - "0"
              - "1"
              - "2"
            default: "0"
        - name: lat
          in: query
          description: Latitude
          required: false
          schema:
            type: number
            format: double
        - name: lon
          in: query
          description: Longitude
          required: false
          schema:
            type: number
            format: double
        - name: polygon
          in: query
          description: Polygon coordinates
          required: false
          schema:
            type: string
            pattern: ^(\d+\.\d+,\d+\.\d+,)*\d+\.\d+,\d+\.\d+$
        - name: radius
          in: query
          description: Search radius in meters
          required: false
          schema:
            type: integer
            maximum: 200
        - name: include_shape
          in: query
          description: Include shape data
          required: false
          schema:
            type: boolean
            default: false
        - name: include_count
          in: query
          description: Include total count
          required: false
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          description: Number of results
          required: false
          schema:
            type: integer
            default: 10
            maximum: 50
        - name: offset
          in: query
          description: Result offset
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - results
                properties:
                  status:
                    type: string
                    enum:
                      - success
                      - zero results
                      - error
                  results:
                    type: array
                    items:
                      type: object
                      required:
                        - region
                        - city
                        - code
                        - lat
                        - lon
                      properties:
                        region:
                          type: string
                        city:
                          type: string
                        code:
                          type: string
                        lat:
                          type: string
                        lon:
                          type: string
