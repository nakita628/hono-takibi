openapi: 3.1.0
info:
  title: Default Response API
  version: 1.0.0
paths:
  /items:
    post:
      operationId: createItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      responses:
        default:
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
  /ping:
    get:
      operationId: ping
      responses:
        '2XX':
          description: ok
          content:
            text/plain:
              schema:
                type: string
components:
  schemas:
    Item:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
