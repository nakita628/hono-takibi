openapi: 3.1.0
info:
  title: Takibi Hono Comprehensive Fixture
  version: 1.0.0
  description: Exercises every component type plus webhooks for takibi-hono code generation.
servers:
  - url: https://api.example.com/v1
paths:
  /users:
    get:
      operationId: listUsers
      summary: List users
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          $ref: "#/components/responses/UserListResponse"
    post:
      operationId: createUser
      summary: Create user
      requestBody:
        $ref: "#/components/requestBodies/CreateUserBody"
      responses:
        "201":
          description: Created
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              examples:
                Alice:
                  $ref: "#/components/examples/UserExample"
          links:
            GetUser:
              $ref: "#/components/links/GetUserLink"
  /users/{id}:
    get:
      operationId: getUserById
      summary: Get user by id
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateUser
      summary: Update user
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      summary: Delete user
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "204":
          description: Deleted
  /products:
    $ref: "#/components/pathItems/ProductsItem"
webhooks:
  newUser:
    post:
      operationId: newUserWebhook
      summary: Notify when a user is created
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "200":
          description: Acknowledged
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
          maxLength: 64
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - admin
            - member
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - admin
            - member
    UserList:
      type: array
      items:
        $ref: "#/components/schemas/User"
    Product:
      type: object
      properties:
        sku:
          type: string
        price:
          type: number
        inStock:
          type: boolean
      required:
        - sku
        - price
        - inStock
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      required:
        - code
        - message
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    UserIdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
  headers:
    XRequestId:
      description: Unique request identifier
      schema:
        type: string
        format: uuid
    XRateLimit:
      description: Remaining quota
      schema:
        type: integer
  requestBodies:
    CreateUserBody:
      required: true
      description: Payload for creating a user
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              email:
                type: string
                format: email
              role:
                type: string
                enum:
                  - admin
                  - member
            required:
              - name
              - email
              - role
  responses:
    UserListResponse:
      description: A list of users
      headers:
        X-Rate-Limit:
          $ref: "#/components/headers/XRateLimit"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserList"
  examples:
    UserExample:
      summary: Example user
      value:
        id: 1
        name: Alice
        email: alice@example.com
        role: admin
        createdAt: "2026-01-01T00:00:00Z"
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  links:
    GetUserLink:
      operationId: getUserById
      parameters:
        id: $response.body#/id
      description: Get the created user
  callbacks:
    UserCreated:
      "{$request.body#/callbackUrl}":
        post:
          operationId: userCreatedCallback
          requestBody:
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/User"
          responses:
            "200":
              description: Callback processed
  pathItems:
    ProductsItem:
      get:
        operationId: listProducts
        responses:
          "200":
            description: OK
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: "#/components/schemas/Product"
      post:
        operationId: createProduct
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        responses:
          "201":
            description: Created
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Product"
  mediaTypes:
    JsonUser:
      schema:
        $ref: "#/components/schemas/User"
    JsonError:
      schema:
        $ref: "#/components/schemas/Error"
